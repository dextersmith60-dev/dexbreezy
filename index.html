    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-light: #ffffff;
            --text-dark: #ffffff;
            --text-light: #000000;
            --text-muted-dark: #888888;
            --text-muted-light: #666666;
            --border-dark: rgba(255, 255, 255, 0.05);
            --border-light: rgba(0, 0, 0, 0.1);
            --accent: #00ff88;
            --accent-ai: #bb86fc;
            --nav-bg: rgba(15, 15, 15, 0.7);
            --card-bg: rgba(26, 26, 26, 0.8);
        }

        html.light-mode {
            --bg-dark: #ffffff;
            --bg-light: #0f0f0f;
            --text-dark: #000000;
            --text-light: #ffffff;
            --text-muted-dark: #666666;
            --text-muted-light: #aaaaaa;
            --border-dark: rgba(0, 0, 0, 0.1);
            --border-light: rgba(255, 255, 255, 0.05);
            --nav-bg: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(245, 245, 245, 0.8);
        }

        /* Base Styles */
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            transition: background-color 0.3s ease, color 0.3s ease;
            @media (prefers-reduced-motion: reduce) {
                transition: none;
            }
        }

        /* Header Navigation */
        .main-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            box-sizing: border-box;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-dark);
            z-index: 2000;
        }

        .nav-logo { 
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -1px;
            text-transform: lowercase;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .nav-logo:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-links a, .nav-cta a {
            color: var(--text-muted-dark);
            text-decoration: none;
            padding: 8px 12px;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-cta a:hover {
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.05);
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-dark);
            color: var(--text-dark);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .install-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: none;
        }

        .install-btn.show {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .install-btn:hover {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .install-btn:active {
            transform: scale(0.95);
        }

        /* Download Button & Menu */
        .download-btn {
            background: none;
            border: 1px solid var(--text-muted-dark);
            color: var(--text-muted-dark);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .download-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        .download-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            margin-top: 8px;
            min-width: 200px;
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .download-menu.show {
            display: flex;
        }

        .download-menu a, .download-menu button {
            padding: 12px 16px;
            color: var(--text-dark);
            text-decoration: none;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: left;
            transition: all 0.2s ease;
            font-family: inherit;
            border-bottom: 1px solid var(--border-dark);
        }

        .download-menu a:last-child, .download-menu button:last-child {
            border-bottom: none;
        }

        .download-menu a:hover, .download-menu button:hover {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            padding-left: 20px;
        }

        .download-menu a:active, .download-menu button:active {
            transform: scale(0.98);
        }

        /* Content Styles */
        .container {
            max-width: 900px;
            width: 90%;
            text-align: center;
            z-index: 10;
            margin-top: 80px;
            margin-bottom: 280px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 1rem 0 0.5rem;
            letter-spacing: -2px;
            font-weight: 800;
            text-transform: lowercase;
            background: linear-gradient(180deg, var(--text-dark) 30%, var(--text-muted-dark) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: background 0.5s ease;
        }

        p { 
            color: var(--text-muted-dark);
            font-size: clamp(1rem, 2vw, 1.1rem);
            line-height: 1.6;
            margin: 1rem 0;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 10px 22px;
            color: var(--text-dark);
            text-decoration: none;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            cursor: pointer;
            background: transparent;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--text-dark);
            color: var(--bg-dark);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Project Grid */
        .project-grid {
            display: grid;
            gap: 20px;
            margin-top: 30px;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .project-card {
            border: 1px solid var(--border-dark);
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            background: var(--card-bg);
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(0, 255, 136, 0.1);
        }

        .project-card span {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
        }

        .project-card h3 {
            margin: 5px 0;
            text-transform: lowercase;
            font-size: 1.2rem;
        }

        .project-card p {
            font-size: 0.9rem;
            margin-bottom: 0;
            color: var(--text-muted-dark);
        }

        /* Unified Footer System */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            background: var(--nav-bg);
            border-top: 1px solid var(--border-dark);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 900;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 0;
        }

        .footer-nav a {
            color: var(--text-muted-dark);
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.3s ease;
        }

        .footer-nav a:hover {
            color: var(--text-dark);
        }

        .copyright {
            color: var(--text-muted-dark);
            font-size: 0.65rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Status Badge */
        #status-badge {
            display: inline-flex;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-dark);
            font-size: 0.75rem;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--text-muted-dark);
            border-radius: 50%;
            margin-right: 10px;
            transition: all 0.3s ease;
        }

        .online .dot {
            background-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        .offline .dot {
            background-color: #ff4444;
            animation: none;
        }

        .ai-active .dot {
            background-color: var(--accent-ai);
            box-shadow: 0 0 15px var(--accent-ai);
            animation: ai-pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes ai-pulse {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.3); filter: brightness(1.5); }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }

        /* AI Input */
        .ai-input-wrapper {
            margin-top: 15px;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .ai-input-wrapper:focus-within {
            opacity: 1;
        }

        #ai-cmd {
            background: transparent;
            border: 1px solid var(--border-dark);
            color: var(--text-dark);
            padding: 10px 16px;
            border-radius: 20px;
            width: min(250px, 100%);
            font-size: 0.8rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        #ai-cmd:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        #ai-cmd::placeholder {
            color: var(--text-muted-dark);
        }

        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            justify-content: center;
        }

        .suggestion-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-muted-dark);
            transition: all 0.2s ease;
        }

        .suggestion-tag:hover {
            color: var(--text-dark);
            border-color: var(--text-dark);
        }

        /* Update Banner */
        .update-banner {
            position: fixed;
            bottom: -100px; /* Start off-screen */
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: var(--bg-dark);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: bottom 0.5s ease-in-out;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .update-banner.show {
            bottom: 80px; /* Slide in */
        }
        #update-btn-reload {
            background: var(--bg-dark);
            color: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-nav {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .nav-links {
                order: 2;
            }

            .container {
                margin-bottom: 350px;
            }

            .site-footer {
                padding: 15px 20px;
            }

            .footer-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .footer-nav {
                justify-content: center;
            }

            h1 {
                font-size: 2.5rem;
            }

            .project-grid {
                grid-template-columns: 1fr;
            }

            .update-banner.show {
                bottom: 150px; /* Adjust for taller mobile footer */
                width: 90%;
            }
        }

        @media (max-width: 480px) {
            .links {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            #ai-cmd {
                width: 100%;
            }
        }

        /* View Transitions support */
        @keyframes slide-from-right {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slide-to-left {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-30px); }
        }

        ::view-transition-old(root) {
            animation: slide-to-left 0.4s ease-out;
        }

        ::view-transition-new(root) {
            animation: slide-from-right 0.4s ease-in;
        }

        @media (prefers-reduced-motion: reduce) { ::view-transition-old(root), ::view-transition-new(root) { animation: none; } }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <header class="main-nav">
        <div class="nav-logo" id="logo-trigger" title="Click to sample color">dexbreezy</div>
        <nav class="nav-links">
            <a href="#" onclick="navigateTo('projects'); return false;">Work</a>

    <div class="container" id="main-content">
        <div id="dynamic-content">
            <h1>dexbreezy</h1>
            <p>Creative Developer & Visionary. <br> Building the future of the web in 2026.</p>
            
            <div class="links">
                <a href="#" class="btn" onclick="navigateTo('projects'); return false;">Projects</a>
                <a href="#" class="btn" onclick="navigateTo('about'); return false;">About</a>

        <div class="ai-input-wrapper">

        <div class="footer-content">
            <div class="footer-left">

                    <a href="https://github.com/dexbreezy" target="_blank" rel="noopener noreferrer" title="Visit GitHub">GitHub</a>
                    <a href="https://linkedin.com/in/dexbreezy" target="_blank" rel="noopener noreferrer" title="Visit LinkedIn">LinkedIn</a>

    <div id="update-banner" class="update-banner">
        <span>A new version is available.</span>
        <button id="update-btn-reload">Update & Reload</button>

<script>
    // Inside /js/modules/commands.js
const executeCommand = (input) => {
    const cleanInput = input.trim().toLowerCase();
    
    // Fuzzy search: 'wrk' will match 'work'
    const match = Object.keys(CONFIG.COMMANDS).find(key => 
        key.split('|').some(keyword => keyword.includes(cleanInput))
    );

    if (match) {
        actions[CONFIG.COMMANDS[match]]();
    } else {
        notify("System error: Command ambiguity detected.");
    }
};
    // Navigation Logic
        const navigateTo = (page) => {
            const dynamicContent = document.getElementById('dynamic-content');
            
            // Trigger View Transition if supported
            if (!document.startViewTransition) {
                updatePageContent(page, dynamicContent);
                return;
            }

            document.startViewTransition(() => updatePageContent(page, dynamicContent));
        };

        const updatePageContent = (page, container) => {
            if (page === 'projects') {
                container.innerHTML = `
                    <h1>Work</h1>
                    <div class="project-grid">
                        ${CONFIG.PROJECT_DATA.map(p => `
                            <div class="project-card">
                                <span>${p.tag}</span>
                                <h3>${p.title}</h3>
                                <p>${p.desc}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div class="links"><a href="#" class="btn" onclick="navigateTo('home')">Back Home</a></div>
                `;
            } else if (page === 'about') {
                container.innerHTML = `
                    <h1>About</h1>
                    <p>Building minimalist digital architecture. Expert in WebGL, AI integration, and high-performance interfaces.</p>
                    <div class="links"><a href="#" class="btn" onclick="navigateTo('home')">Back Home</a></div>
                `;
            } else {
                container.innerHTML = `
                    <h1>dexbreezy</h1>
                    <p>Creative Developer & Visionary. <br> Building the future of the web in 2026.</p>
                    <div class="links">
                        <a href="#" class="btn" onclick="navigateTo('projects')">Projects</a>
                        <a href="#" class="btn" onclick="navigateTo('about')">About</a>
                        <a href="mailto:hello@dexbreezy.com" class="btn">Contact</a>
                    </div>
                `;
            }
            StatusManager.updateTemp(`Mapsd to ${page}`);
        };

        // Background Effect (Canvas)
        const BackgroundEffect = {
            canvas: document.getElementById('bg-canvas'),
            ctx: null,
            particles: [],

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                for(let i=0; i<50; i++) this.particles.push({
                    x: Math.random() * this.canvas.width,
                    y: Math.random() * this.canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
                this.animate();
            },

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const color = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
                this.ctx.fillStyle = color;
                
                this.particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > this.canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > this.canvas.height) p.vy *= -1;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                requestAnimationFrame(() => this.animate());
            }
        };

        // Final Status Manager Logic
        StatusManager.updateTemp = (msg) => {
            const el = document.getElementById('status-text');
            const original = el.innerText;
            el.innerText = msg;
            setTimeout(() => { el.innerText = original; }, 3000);
        };

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            ThemeManager.init();
            CommandSystem.init();
            PWAManager.init();
            BackgroundEffect.init();
            StatusManager.init();
            
            // Dropdown Logic
            const dlBtn = document.getElementById('download-btn');
            const dlMenu = document.getElementById('download-menu');
            dlBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dlMenu.classList.toggle('show');
            });
            document.addEventListener('click', () => dlMenu.classList.remove('show'));
        });
        if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered for dexbreezy');
        }).catch(err => console.log('SW registration failed:', err));
    });
}
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            // Check for updates
            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        // Show your update banner
                        document.getElementById('update-banner').classList.add('show');
                    }
                });
            });
        });
    });
}

// Handle the manual reload button
document.getElementById('update-btn-reload').addEventListener('click', () => {
    window.location.reload();
});// Function to request the wake lock
let wakeLock = null;

const requestWakeLock = async () => {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log('Wake Lock is active!');

    // Listen for the lock being released (e.g., if the user switches tabs)
    wakeLock.addEventListener('release', () => {
      console.log('Wake Lock was released');
    });
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
};

// Request the lock on page load
requestWakeLock();

// Re-request the lock if the tab becomes visible again
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    await requestWakeLock();
  }
});
